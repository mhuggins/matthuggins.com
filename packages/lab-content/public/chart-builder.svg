<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8fafc"/>

  <!-- ══ Glass-box panel (chat + tools) ══ -->
  <rect x="8" y="8" width="270" height="284" rx="8" fill="#1e293b"/>
  <circle cx="29" cy="27" r="4.5" fill="#ef4444" opacity="0.7"/>
  <circle cx="46" cy="27" r="4.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="63" cy="27" r="4.5" fill="#22c55e" opacity="0.7"/>

  <!-- User bubble -->
  <rect x="96" y="48" width="166" height="34" rx="8" fill="#358799"/>
  <text x="110" y="60" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" dominant-baseline="middle">High &amp; low in Tokyo,</text>
  <text x="110" y="73" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" dominant-baseline="middle">next 7 days, as a line</text>

  <!-- Assistant bubble -->
  <rect x="24" y="100" width="200" height="34" rx="8" fill="#334155"/>
  <text x="38" y="112" font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1" dominant-baseline="middle">Here is the forecast. Highs</text>
  <text x="38" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1" dominant-baseline="middle">climb toward the weekend.</text>

  <!-- Tool-call pipeline -->
  <text x="24" y="184" font-family="ui-monospace,monospace" font-size="9.5" fill="#64748b" dominant-baseline="middle">TOOL CALLS</text>
  <rect x="24" y="194" width="98" height="22" rx="11" fill="#0f172a" stroke="#3b5566" stroke-width="1"/>
  <text x="73" y="206" font-family="ui-monospace,monospace" font-size="9.5" fill="#5cc2d6" text-anchor="middle" dominant-baseline="middle">geocodeLocation</text>
  <text x="130" y="206" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle" dominant-baseline="middle">→</text>
  <rect x="140" y="194" width="74" height="22" rx="11" fill="#0f172a" stroke="#3b5566" stroke-width="1"/>
  <text x="177" y="206" font-family="ui-monospace,monospace" font-size="9.5" fill="#5cc2d6" text-anchor="middle" dominant-baseline="middle">getWeather</text>

  <rect x="24" y="226" width="98" height="22" rx="11" fill="#0f172a" stroke="#3b5566" stroke-width="1"/>
  <text x="73" y="238" font-family="ui-monospace,monospace" font-size="9.5" fill="#5cc2d6" text-anchor="middle" dominant-baseline="middle">buildChartSpec</text>

  <!-- ══ Chart panel ══ -->
  <rect x="300" y="8" width="292" height="284" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="322" y="36" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a" dominant-baseline="middle">Tokyo temperature (°C)</text>

  <!-- Axes -->
  <line x1="330" y1="60" x2="330" y2="248" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="330" y1="248" x2="568" y2="248" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Gridlines -->
  <line x1="330" y1="110" x2="568" y2="110" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="330" y1="160" x2="568" y2="160" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="330" y1="210" x2="568" y2="210" stroke="#f1f5f9" stroke-width="1"/>

  <!-- High line (teal) -->
  <polyline fill="none" stroke="#358799" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    points="350,150 384,132 418,140 452,108 486,96 520,84 554,72"/>
  <!-- Low line (amber) -->
  <polyline fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    points="350,206 384,198 418,210 452,188 486,182 520,176 554,168"/>

  <!-- Point markers (high) -->
  <g fill="#358799">
    <circle cx="350" cy="150" r="3"/><circle cx="384" cy="132" r="3"/><circle cx="418" cy="140" r="3"/>
    <circle cx="452" cy="108" r="3"/><circle cx="486" cy="96" r="3"/><circle cx="520" cy="84" r="3"/><circle cx="554" cy="72" r="3"/>
  </g>

  <!-- Point markers (low) -->
  <g fill="#f59e0b">
    <circle cx="350" cy="206" r="3"/><circle cx="384" cy="198" r="3"/><circle cx="418" cy="210" r="3"/>
    <circle cx="452" cy="188" r="3"/><circle cx="486" cy="182" r="3"/><circle cx="520" cy="176" r="3"/><circle cx="554" cy="168" r="3"/>
  </g>

  <!-- Legend -->
  <line x1="488" y1="52" x2="504" y2="52" stroke="#358799" stroke-width="2.5"/>
  <text x="508" y="52" font-family="system-ui,sans-serif" font-size="10" fill="#475569" dominant-baseline="middle">high</text>
  <line x1="544" y1="52" x2="560" y2="52" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="564" y="52" font-family="system-ui,sans-serif" font-size="10" fill="#475569" dominant-baseline="middle">low</text>

  <!-- X labels -->
  <text x="350" y="262" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8" text-anchor="middle">Mon</text>
  <text x="452" y="262" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8" text-anchor="middle">Thu</text>
  <text x="554" y="262" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8" text-anchor="middle">Sun</text>
</svg>
